name: flutter_althea_diagnostics
description: AltheaCare Diagnostic Partner App - Medical-grade sample
  intelligence infrastructure
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.5
  crypto: ^3.0.3
  dartz: ^0.10.1
  dio: ^5.4.0
  encrypt: ^5.0.3
  fl_chart: ^0.66.0
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.7
  flutter_polyline_points: ^2.0.1
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.9
  freezed_annotation: ^2.4.1
  geolocator: ^11.0.0
  go_router: ^13.0.0
  google_maps_flutter: ^2.5.3
  google_mlkit_text_recognition: ^0.11.0
  graphql_flutter: ^5.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  json_annotation: ^4.9.0
  logger: ^2.0.2+1
  lottie: ^3.0.0
  mobile_scanner: ^3.5.5
  pdf: ^3.10.7
  permission_handler: ^11.2.0
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  retrofit: ^4.1.0
  riverpod_annotation: ^2.3.5
  sensors_plus: ^4.0.2
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  syncfusion_flutter_charts: ^24.2.9
  timeago: ^3.6.1
  uuid: ^4.3.3
  vibration: ^1.8.4

dev_dependencies:
  build_runner: ^2.4.8
  custom_lint: ^0.6.2
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  freezed: ^2.4.6
  json_serializable: ^6.7.1

  # Testing
  mockito: ^5.4.4
  riverpod_generator: ^2.3.11
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  fonts:
    - family: BalooBhaijaan2
      fonts:
        - asset: assets/fonts/BalooBhaijaan2-Regular.ttf
          weight: 400
        - asset: assets/fonts/BalooBhaijaan2-Medium.ttf
          weight: 500
        - asset: assets/fonts/BalooBhaijaan2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BalooBhaijaan2-Bold.ttf
          weight: 700
        - asset: assets/fonts/BalooBhaijaan2-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
