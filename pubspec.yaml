name: flutter_althea_diagnostics
description: AltheaCare Diagnostic Partner App - Medical-grade sample
  intelligence infrastructure
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.5
  crypto: ^3.0.3
  dartz: ^0.10.1
  dio: ^5.4.0
  encrypt: ^5.0.3
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_blue_plus: ^2.1.1
  flutter_polyline_points: ^3.1.0
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.9
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.2
  go_router: ^17.1.0
  google_maps_flutter: ^2.5.3
  google_mlkit_text_recognition: ^0.15.1
  graphql_flutter: ^5.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.0.7
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.0.2+1
  lottie: ^3.0.0
  mobile_scanner: ^7.1.4
  package_info_plus: ^9.0.0
  pdf: ^3.10.7
  permission_handler: ^12.0.1
  printing: ^5.12.0
  qr_flutter: ^4.1.0
  retrofit: ^4.1.0
  riverpod_annotation: ^4.0.0
  sensors_plus: ^7.0.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  syncfusion_flutter_charts: ^32.2.4
  timeago: ^3.6.1
  uuid: ^4.3.3
  vibration: ^3.1.6

dev_dependencies:
  build_runner: ^2.4.8
  custom_lint: ^0.8.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.7.1

  # Testing
  mockito: ^5.4.4
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.0.3

flutter:
  uses-material-design: true

  fonts:
    - family: BalooBhaijaan2
      fonts:
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/BalooBhaijaan2-VariableFont_wght.ttf
          weight: 800
  # assets:
  # - assets/images/
  # - assets/icons/
  # - assets/lottie/
