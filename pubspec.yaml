name: flutter_althea_diagnostics
description: AltheaCare Diagnostic Partner App - Medical-grade sample intelligence infrastructure
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Navigation
  go_router: ^13.0.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # Barcode/QR
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0

  # BLE for Biometric Handshake
  flutter_blue_plus: ^1.31.7

  # Location & Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.5.3
  flutter_polyline_points: ^2.0.1

  # Sensors & IoT
  sensors_plus: ^4.0.2

  # Charts & Graphs
  fl_chart: ^0.66.0
  syncfusion_flutter_charts: ^24.2.9

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.12.0

  # Date & Time
  intl: ^0.19.0
  timeago: ^3.6.1

  # Permissions
  permission_handler: ^11.2.0

  # Image Handling & OCR
  image_picker: ^1.0.7
  google_mlkit_text_recognition: ^0.11.0

  # Haptic Feedback
  vibration: ^1.8.4

  # Encryption & Security
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.11
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.2

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  fonts:
    - family: BalooBhaijaan2
      fonts:
        - asset: assets/fonts/BalooBhaijaan2-Regular.ttf
          weight: 400
        - asset: assets/fonts/BalooBhaijaan2-Medium.ttf
          weight: 500
        - asset: assets/fonts/BalooBhaijaan2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BalooBhaijaan2-Bold.ttf
          weight: 700
        - asset: assets/fonts/BalooBhaijaan2-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
