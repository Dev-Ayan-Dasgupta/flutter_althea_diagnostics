targets:
  $default:
    builders:
      freezed:
        enabled: true
        options:
          # Generate copyWith methods
          copy_with: true
          # Generate == and hashCode
          equal: true
          # Generate toString
          to_string: true

      json_serializable:
        enabled: true
        options:
          # Generate fromJson and toJson
          explicit_to_json: true
          # Handle null values
          include_if_null: false
          # Use camelCase for JSON keys
          field_rename: none

      riverpod_generator:
        enabled: true
        options:
          # Generate Riverpod providers
          provider_type: autoDispose
